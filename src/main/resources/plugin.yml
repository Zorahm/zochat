name: zoChat
version: 1.6
main: zorahm.zochat.ChatPlugin
api-version: 1.21
description: Enhanced chat plugin with local/global chat, mentions (@everyone/@here), smart placeholders, advanced word filter, and more.
author: ZorahM
website: https://github.com/Zorahm/zochat
depend:
  - LuckPerms
softdepend:
  - Adventure
commands:
  chat:
    description: Управление настройками чата
    usage: /<command> [reload]
    aliases: [zochat]
  global:
    description: Отправка сообщения в глобальный чат
    usage: /<command> [сообщение]
    aliases: [g]
  local:
    description: Отправка сообщения в локальный чат
    usage: /<command> [сообщение]
    aliases: [l]
  msg:
    description: Отправка приватного сообщения игроку
    usage: /<command> <игрок> <сообщение>
    aliases: [m, tell, w]
  reply:
    description: Ответ на последнее приватное сообщение
    usage: /<command> <сообщение>
    aliases: [r]
  mute:
    description: Замьютить игрока
    usage: /<command> <игрок> [длительность(сек)] [причина]
  unmute:
    description: Размьютить игрока
    usage: /<command> <игрок>
  warn:
    description: Выдать варнинг игроку
    usage: /<command> <игрок> [причина]
  chatban:
    description: Забанить игрока в чате навсегда
    usage: /<command> <игрок> [причина]
  clearchat:
    description: Очистить чат для всех игроков
    usage: /<command>
  history:
    description: Просмотреть историю личных сообщений с игроком
    usage: /<command> <игрок>
  seen:
    description: Показать когда игрок был в сети
    usage: /<command> <игрок>
  broadcast:
    description: Отправить объявление всем игрокам
    usage: /<command> <сообщение>
    aliases: [bc]
  ignore:
    description: Игнорировать сообщения от игрока
    usage: /<command> <игрок>
  unignore:
    description: Перестать игнорировать игрока
    usage: /<command> <игрок>
  ignorelist:
    description: Список игнорируемых игроков
    usage: /<command>
permissions:
  zochat.admin:
    description: Доступ к админским командам плагина (например, /chat reload)
    default: op
  zochat.global:
    description: Доступ к глобальному чату
    default: true
  zochat.local:
    description: Доступ к локальному чату
    default: true
  zochat.msg:
    description: Доступ к отправке приватных сообщений
    default: true
  zochat.spam.bypass:
    description: Обход ограничений антиспама
    default: op
  zochat.mention.everyone:
    description: Доступ к упоминанию всех игроков через @everyone
    default: op
  zochat.mention.here:
    description: Доступ к упоминанию игроков поблизости через @here
    default: op
  zochat.placeholder.loc:
    description: Доступ к использованию плейсхолдера ^loc (координаты)
    default: true
  zochat.placeholder.world:
    description: Доступ к использованию плейсхолдера ^world (мир)
    default: true
  zochat.placeholder.time:
    description: Доступ к использованию плейсхолдера ^time (время)
    default: true
  zochat.placeholder.health:
    description: Доступ к использованию плейсхолдера ^health (здоровье)
    default: true
  zochat.placeholder.ping:
    description: Доступ к использованию плейсхолдера ^ping (пинг)
    default: true
  zochat.placeholder.biome:
    description: Доступ к использованию плейсхолдера ^biome (биом)
    default: true
  zochat.placeholder.item:
    description: Доступ к использованию плейсхолдера ^item (предмет в руке)
    default: true
  zochat.mute:
    description: Право на использование команды /mute
    default: op
  zochat.unmute:
    description: Право на использование команды /unmute
    default: op
  zochat.warn:
    description: Право на использование команды /warn
    default: op
  zochat.chatban:
    description: Право на использование команды /chatban
    default: op
  zochat.clearchat:
    description: Право на использование команды /clearchat
    default: op
  zochat.clearchat.bypass:
    description: Игроки с этим правом увидят только уведомление при очистке чата
    default: op
  zochat.broadcast:
    description: Право на использование команды /broadcast
    default: op
  zochat.moderation.bypass:
    description: Обход всех ограничений модерации (нельзя мьютнуть/забанить)
    default: op