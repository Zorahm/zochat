# ════════════════════════════════════════════
#            Конфигурация zoChat
# ════════════════════════════════════════════

config-version: 1.6 # Не меняйте!
debug-mode: false

# Язык сообщений
message: ru

# ───── Настройки антиспама ─────
anti-spam:
  enabled: true                        # Включить антиспам для ограничения частоты сообщений
  local-cooldown: 3                    # Кулдаун для локального чата (в секундах)
  global-cooldown: 5                   # Кулдаун для глобального чата (в секундах)
  private-cooldown: 2                  # Кулдаун для личных сообщений (в секундах)
  bypass-permission: "zochat.spam.bypass" # Право для обхода антиспама

# ───── Настройки фильтрации слов ─────
banned-words:
  enabled: true                        # Включить фильтрацию запрещённых слов
  mode: "smart"                        # Режим фильтрации: "exact" (точное совпадение), "contains" (содержит), "smart" (умная проверка с нормализацией)
  action: "block"                      # Действие: "block" (заблокировать сообщение), "replace" (заменить на ***)
  words: []                            # Список запрещённых слов (например, ["плохое_слово", "regex:\\b\\d{4}-\\d{4}-\\d{4}-\\d{4}\\b"])
                                       # Для регулярных выражений используйте префикс "regex:" (например, "regex:\\b(bad|word)\\b")

# ───── Настройки для упоминаний ─────
mention:
  # Обычное упоминание @PlayerName
  format: "<yellow><bold>@{player}</bold></yellow>"  # Формат подсветки упоминания
  sound: "ENTITY_EXPERIENCE_ORB_PICKUP"             # Звук при упоминании
  message: "<yellow>Тебя упомянули в чате!</yellow>" # Уведомление через Action Bar

  # Упоминание @everyone - упоминает всех игроков на сервере
  everyone-permission: "zochat.mention.everyone"    # Право для использования @everyone
  everyone-format: "<red><bold>@everyone</bold></red>"  # Формат отображения @everyone
  everyone-message: "<red>Вас упомянули через @everyone!</red>"  # Уведомление при @everyone

  # Упоминание @here - упоминает игроков поблизости
  here-permission: "zochat.mention.here"            # Право для использования @here
  here-format: "<gold><bold>@here</bold></gold>"    # Формат отображения @here
  here-message: "<gold>Вас упомянули через @here!</gold>"  # Уведомление при @here
  here-radius: 100                                  # Радиус действия @here (в блоках)

# ───── Настройки локального чата ─────
local-chat:
  enabled: true                        # Включить локальный чат
  radius: 50                           # Радиус действия локального чата
  format: "<gradient:#55ff55:#aaffaa>[Локальный]</gradient> <#c0c0c0>•</#c0c0c0> <#fcfcfc>{prefix}{suffix}{player}<#c0c0c0> › </#c0c0c0>{message}"  # Формат чата
  command: "/lo"                       # Команда для локального чата

# ───── Настройки глобального чата ─────
global-chat:
  enabled: true                        # Включить глобальный чат
  format: "<gradient:#ffaa33:#ffd700>[Глобальный]</gradient> <#c0c0c0>•</#c0c0c0> <#fcfcfc>{prefix}{suffix}{player}<#c0c0c0> › </#c0c0c0>{message}"  # Формат чата
  command: "/g"                        # Команда для глобального чата

# ───── Настройки для приватных сообщений ─────
private-messages:
  format: "<gradient:#f6a0d3:#b47ee5>✉️ ЛС от {player}:</gradient> <white>{message}</white>"  # Входящее сообщение
  reply-format: "<gradient:#b47ee5:#f6a0d3>✉️ Вы → {player}:</gradient> <white>{message}</white>"  # Исходящее сообщение

# ───── Настройки оффлайн-сообщений ─────
offline-messages:
  enabled: true

# ───── Настройки базы данных для логирования чата ─────
database:
  type: "sqlite"                        # Выберите тип базы данных: "sqlite" или "mysql"
  mysql:
    host: "localhost"                    # Адрес MySQL сервера
    port: 3306                           # Порт MySQL сервера
    database: "minecraft_chat"           # Название базы данных
    username: "root"                     # Имя пользователя для подключения
    password: "password"                 # Пароль для доступа к базе данных

# ───── Настройки сообщений о входе, выходе и достижениях ─────
join-message:
  enabled: false                        # Включить сообщения о входе
  format: "<gradient:#55ff55:#aaffaa>{player} присоединился к игре!</gradient>"  # Формат сообщения
  sound: "ENTITY_PLAYER_LEVELUP"       # Звук при входе (опционально)
  stealth-permission: "zochat.stealth.join"  # Право для скрытия сообщения о входе

quit-message:
  enabled: false                        # Включить сообщения о выходе
  format: "<gradient:#ff5555:#ffaaaa>{player} покинул игру!</gradient>"  # Формат сообщения
  sound: "ENTITY_VILLAGER_NO"          # Звук при выходе (опционально)
  stealth-permission: "zochat.stealth.quit"  # Право для скрытия сообщения о выходе

advancement-message:
  enabled: false                        # Включить кастомные сообщения о достижениях
  format: "<yellow>{player} получил достижение <green>{advancement}</green>!</yellow>\n<gray>{description}</gray>"  # Формат сообщения. Доступные плейсхолдеры: {player}, {advancement}, {description}
  sound: "UI_TOAST_CHALLENGE_COMPLETE"  # Звук при достижении (опционально)

# ───── Настройки умных плейсхолдеров ─────
# Игроки могут использовать плейсхолдеры в чате (например: "Я нахожусь ^loc")
# Каждый плейсхолдер может иметь алиасы для удобства
placeholders:
  enabled: true                        # Включить умные плейсхолдеры
  loc:
    enabled: true                      # Включить плейсхолдер ^loc
    aliases: ["coords", "pos", "где"]   # Алиасы: ^coords, ^pos, ^где
    permission: "zochat.placeholder.loc"  # Право для использования
    format: "<gray>{x}, {y}, {z}</gray>"  # Формат координат. Доступно: {x}, {y}, {z}, {world}
  world:
    enabled: true
    aliases: ["мир", "w"]
    permission: "zochat.placeholder.world"
    format: "<aqua>{world}</aqua>"     # Формат мира. Доступно: {world}
  time:
    enabled: true
    aliases: ["время", "clock"]
    permission: "zochat.placeholder.time"
    format: "<gray>{time}</gray>"      # Формат времени. Доступно: {time} (время в мире), {realtime} (реальное время)
  health:
    enabled: true
    aliases: ["hp", "здоровье"]
    permission: "zochat.placeholder.health"
    format: "<red>{health} ♥</red>"    # Формат здоровья. Доступно: {health}, {maxhealth}
  ping:
    enabled: true
    aliases: ["пинг", "latency"]
    permission: "zochat.placeholder.ping"
    format: "<yellow>{ping}ms</yellow>"  # Формат пинга. Доступно: {ping}
  biome:
    enabled: true
    aliases: ["биом", "b"]
    permission: "zochat.placeholder.biome"
    format: "<green>{biome}</green>"   # Формат биома. Доступно: {biome}
  item:
    enabled: true
    aliases: ["предмет", "hand"]
    permission: "zochat.placeholder.item"
    format: "<blue>[{item}]</blue>"    # Формат предмета в руке. Доступно: {item}, {amount}